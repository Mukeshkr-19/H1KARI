name: Continuous checks

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python, privacy, and protocol
    runs-on: macos-15
    timeout-minutes: 45
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev-macos-arm64-py312.lock

      - name: Verify frontend third-party input
        run: python scripts/frontend_third_party.py --check

      - name: Install system dependency
        run: brew install portaudio

      - name: Install locked Python dependencies
        run: python -m pip install --requirement requirements-dev-macos-arm64-py312.lock

      - name: Run Python suite
        run: python -m pytest tests -q

      - name: Run read-only voice status
        run: python hikari.py --voice-status

      - name: Run public-source privacy scan
        run: python tests/privacy_scan.py

      - name: Verify shared protocol schema
        run: python -m pytest tests/test_protocol_v1.py -q

  frontend:
    name: Frontend dependencies, lint, and build
    runs-on: macos-15
    timeout-minutes: 20
    defaults:
      run:
        working-directory: hikari-frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hikari-frontend/package-lock.json

      - name: Install locked frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
